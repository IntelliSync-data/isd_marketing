name: Update ISD Marketing Fishing VietNam

on:
  push:
    branches:
      - vfo

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy OpenEducCat to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script_stop: true
        script: |
          # Clone if not exists, otherwise update
          if [ ! -d ~/addons-system/isd_marketing ]; then
            git clone git@github.com:IntelliSync-data/isd_marketing.git ~/addons-system/isd_marketing
            cd ~/addons-system/isd_marketing && git checkout vfo
          else
            cd ~/addons-system/isd_marketing
            git fetch origin && git reset --hard origin/vfo
          fi
          
          # Sync isd_marketing directory with rsync (including deletions)
          sudo mkdir -p /opt/custom-addons/isd_marketing
          sudo rsync -av --delete ~/addons-system/isd_marketing/ /opt/custom-addons/isd_marketing/

    - name: Update isd_payment Module
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          echo "Updating apps list..."
          echo "env['ir.module.module'].update_list(); env.cr.commit()" | sudo -u odoo /opt/odoo-venv/bin/python /opt/odoo18/odoo-bin shell -c /etc/odoo/odoo.conf -d ${{ secrets.VFO_DB_NAME }} --no-http

    - name: Restart Odoo Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          sudo systemctl restart odoo

    - name: Verify Odoo Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          sleep 5
          if sudo systemctl is-active --quiet odoo; then
            echo "Odoo restarted successfully"
          else
            echo "Odoo failed to restart"
            echo "=== systemctl status ==="
            sudo systemctl status odoo --no-pager
            echo "=== Last 50 lines of Odoo log ==="
            sudo tail -n 50 /var/log/odoo/odoo.log
            exit 1
          fi