<svg xmlns="http://www.w3.org/2000/svg" width="100" height="75" viewBox="0 0 100 75">
  <!-- Background -->
  <rect width="100" height="75" fill="#f8f9fa" rx="3"/>

  <!-- Border -->
  <rect x="2" y="2" width="96" height="71" fill="none" stroke="#dee2e6" stroke-width="2" stroke-dasharray="4,2" rx="2"/>

  <!-- HTML Symbol -->
  <g transform="translate(50, 37.5)">
    <!-- < symbol -->
    <path d="M -15 0 L -22 7 L -15 14" fill="none" stroke="#0066cc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- / symbol -->
    <line x1="-4" y1="14" x2="4" y2="0" stroke="#0066cc" stroke-width="2.5" stroke-linecap="round"/>

    <!-- > symbol -->
    <path d="M 15 0 L 22 7 L 15 14" fill="none" stroke="#0066cc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Code lines decoration -->
  <g opacity="0.25">
    <rect x="15" y="12" width="30" height="2" fill="#0066cc" rx="1"/>
    <rect x="15" y="18" width="45" height="2" fill="#0066cc" rx="1"/>
    <rect x="55" y="12" width="30" height="2" fill="#0066cc" rx="1"/>
    <rect x="55" y="18" width="25" height="2" fill="#0066cc" rx="1"/>
    <rect x="15" y="58" width="35" height="2" fill="#0066cc" rx="1"/>
    <rect x="55" y="58" width="30" height="2" fill="#0066cc" rx="1"/>
  </g>
</svg>
